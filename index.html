<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY 12</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        /* BOTÕES FLUTUANTES - sem textos, só cores */
        .float-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px 0;
        }
        .float-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
        }
        .float-btn:active {
            transform: scale(0.85);
        }
        /* Cores dos botões */
        .float-btn.c1 { background: #ff00aa; border-color: #ff00aa; }
        .float-btn.c2 { background: #ff3366; border-color: #ff3366; }
        .float-btn.c3 { background: #ff8800; border-color: #ff8800; }
        .float-btn.c4 { background: #00ff88; border-color: #00ff88; }
        .float-btn.c5 { background: #ffdd00; border-color: #ffdd00; }
        .float-btn.c6 { background: #ff66aa; border-color: #ff66aa; }
        .float-btn.c7 { background: #aa55ff; border-color: #aa55ff; }
        .float-btn.c8 { background: #00ccff; border-color: #00ccff; }
        .float-btn.c9 { background: #ff4400; border-color: #ff4400; }
        .float-btn.c10 { background: #00ffaa; border-color: #00ffaa; }
        .float-btn.c11 { background: #ff0066; border-color: #ff0066; }
        .float-btn.c12 { background: #ff3377; border-color: #ff3377; }

        /* Efeito de brilho */
        .float-btn::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            background: inherit;
            opacity: 0.3;
            filter: blur(10px);
            z-index: -1;
        }

        /* PLAYER COM VÍDEO play12.mp4 */
        #player-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 10px;
            z-index: 1000;
            display: none;
            border-top: 2px solid rgba(255,255,255,0.1);
        }
        #player-container.active {
            display: block;
        }
        #player-container video {
            width: 100%;
            max-height: 200px;
            background: #000;
            border-radius: 8px;
        }
        #player-container .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 10px 0;
        }
        #player-container .controls button {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 50%;
            transition: 0.2s;
        }
        #player-container .controls button:active {
            transform: scale(0.8);
            background: rgba(255,255,255,0.1);
        }
        #player-container .track-info {
            color: white;
            text-align: center;
            padding: 5px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        #close-player {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px 10px;
        }
        #close-player:active {
            transform: scale(0.8);
        }

        @media (max-width: 600px) {
            .float-btn {
                width: 55px;
                height: 55px;
            }
            .float-buttons {
                gap: 12px;
            }
        }
        @media (max-width: 400px) {
            .float-btn {
                width: 45px;
                height: 45px;
            }
            .float-buttons {
                gap: 10px;
            }
            #player-container video {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="float-buttons" id="buttonContainer">
            <!-- Botões gerados pelo JavaScript -->
        </div>
    </div>

    <!-- PLAYER COM VÍDEO play12.mp4 -->
    <div id="player-container">
        <button id="close-player">✕</button>
        <video id="videoPlayer" controls autoplay playsinline>
            <source src="play12.mp4" type="video/mp4">
        </video>
        <div class="track-info" id="trackInfo">Carregando...</div>
        <div class="controls">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">⏸</button>
            <button id="nextBtn">⏭</button>
        </div>
    </div>

    <script>
        // Lista de cores para os botões (12 gêneros)
        const cores = ['c1','c2','c3','c4','c5','c6','c7','c8','c9','c10','c11','c12'];
        
        // Carrega a lista de músicas do JSON
        const PLAYLIST_URL = 'https://raw.githubusercontent.com/radiolojasjc-hub/play12/refs/heads/main/play.json';
        
        let musicas = [];
        let indexAtual = 0;
        let tocando = false;
        
        const videoPlayer = document.getElementById('videoPlayer');
        const playerContainer = document.getElementById('player-container');
        const trackInfo = document.getElementById('trackInfo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const closeBtn = document.getElementById('close-player');
        const buttonContainer = document.getElementById('buttonContainer');

        // Busca a lista de músicas
        fetch(PLAYLIST_URL)
            .then(res => {
                if (!res.ok) throw new Error('Erro ao buscar playlist');
                return res.json();
            })
            .then(data => {
                if (Array.isArray(data) && data.length > 0) {
                    musicas = data.filter(m => m.url && m.url.trim() !== '');
                    if (musicas.length === 0) throw new Error('Lista vazia');
                    criarBotoes();
                } else {
                    throw new Error('Dados inválidos');
                }
            })
            .catch(() => {
                // Fallback com música exemplo
                musicas = [{
                    title: 'Música Exemplo',
                    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                    genre: 'pop'
                }];
                criarBotoes();
            });

        // Cria os botões flutuantes (sem textos, só cores)
        function criarBotoes() {
            // Pega os gêneros únicos
            const generos = [...new Set(musicas.map(m => m.genre || 'pop'))];
            
            // Limita a 12 botões
            const generosLimitados = generos.slice(0, 12);
            
            buttonContainer.innerHTML = '';
            
            generosLimitados.forEach((genero, i) => {
                const btn = document.createElement('div');
                btn.className = `float-btn ${cores[i % cores.length]}`;
                btn.dataset.genero = genero;
                btn.dataset.index = i;
                
                btn.addEventListener('click', function() {
                    // Toca a primeira música deste gênero
                    const musicasGenero = musicas.filter(m => (m.genre || 'pop') === genero);
                    if (musicasGenero.length > 0) {
                        const primeiroIndex = musicas.indexOf(musicasGenero[0]);
                        if (primeiroIndex !== -1) {
                            indexAtual = primeiroIndex;
                            tocarMusica();
                        }
                    }
                });
                
                buttonContainer.appendChild(btn);
            });
        }

        // Toca a música atual
        function tocarMusica() {
            if (musicas.length === 0 || indexAtual >= musicas.length) return;
            
            const musica = musicas[indexAtual];
            if (!musica || !musica.url) return;
            
            // Mostra o player
            playerContainer.classList.add('active');
            
            // Atualiza info
            trackInfo.textContent = musica.title || 'Música';
            
            // Toca o vídeo/áudio
            videoPlayer.src = musica.url;
            videoPlayer.load();
            videoPlayer.play().then(() => {
                tocando = true;
                playPauseBtn.textContent = '⏸';
            }).catch(() => {
                tocando = false;
                playPauseBtn.textContent = '▶';
            });
        }

        // Próxima música
        function proximaMusica() {
            if (musicas.length === 0) return;
            indexAtual = (indexAtual + 1) % musicas.length;
            tocarMusica();
        }

        // Música anterior
        function musicaAnterior() {
            if (musicas.length === 0) return;
            indexAtual = (indexAtual - 1 + musicas.length) % musicas.length;
            tocarMusica();
        }

        // Play/Pause
        function togglePlay() {
            if (tocando) {
                videoPlayer.pause();
                tocando = false;
                playPauseBtn.textContent = '▶';
            } else {
                videoPlayer.play().then(() => {
                    tocando = true;
                    playPauseBtn.textContent = '⏸';
                }).catch(() => {});
            }
        }

        // Eventos dos controles
        playPauseBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', proximaMusica);
        prevBtn.addEventListener('click', musicaAnterior);
        
        closeBtn.addEventListener('click', function() {
            playerContainer.classList.remove('active');
            videoPlayer.pause();
            tocando = false;
            playPauseBtn.textContent = '▶';
        });

        // Quando o vídeo termina, vai para o próximo
        videoPlayer.addEventListener('ended', proximaMusica);

        // Quando o usuário clica no player nativo
        videoPlayer.addEventListener('play', () => {
            tocando = true;
            playPauseBtn.textContent = '⏸';
        });
        videoPlayer.addEventListener('pause', () => {
            tocando = false;
            playPauseBtn.textContent = '▶';
        });

        // Carrega o vídeo play12.mp4 automaticamente
        // O vídeo já está no source do elemento video
    </script>
</body>
</html>
