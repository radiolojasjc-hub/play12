<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY 12</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }

        /* BOTÕES FLUTUANTES - SÓ AS BOLINHAS COLORIDAS */
        .botoes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            padding: 30px 0;
        }
        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.1);
        }
        .btn:active {
            transform: scale(0.85);
        }
        
        /* CORES DOS BOTÕES */
        .cor1 { background: #ff0066; }
        .cor2 { background: #ff3366; }
        .cor3 { background: #ff8800; }
        .cor4 { background: #00ff88; }
        .cor5 { background: #ffdd00; }
        .cor6 { background: #ff66aa; }
        .cor7 { background: #aa55ff; }
        .cor8 { background: #00ccff; }
        .cor9 { background: #ff4400; }
        .cor10 { background: #00ffaa; }
        .cor11 { background: #ff00aa; }
        .cor12 { background: #ff3377; }

        /* PLAYER COM VÍDEO play12.mp4 */
        #player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 10px 15px;
            z-index: 999;
            display: none;
            border-top: 2px solid rgba(255,255,255,0.1);
        }
        #player.ativo {
            display: block;
        }
        #player video {
            width: 100%;
            max-height: 200px;
            background: #000;
            border-radius: 8px;
        }
        #player .controles {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 10px 0;
        }
        #player .controles button {
            background: transparent;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }
        #player .controles button:active {
            transform: scale(0.8);
        }
        #player .nome-musica {
            color: white;
            text-align: center;
            padding: 5px;
            font-size: 14px;
        }
        #fechar {
            position: absolute;
            top: 8px;
            right: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }

        @media (max-width: 600px) {
            .btn { width: 55px; height: 55px; }
            .botoes { gap: 14px; }
        }
        @media (max-width: 400px) {
            .btn { width: 45px; height: 45px; }
            .botoes { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="botoes" id="botoesContainer">
            <!-- BOTÕES GERADOS PELO JS -->
        </div>
    </div>

    <!-- PLAYER COM VÍDEO play12.mp4 -->
    <div id="player">
        <button id="fechar">✕</button>
        <video id="video" controls autoplay playsinline>
            <source src="play12.mp4" type="video/mp4">
        </video>
        <div class="nome-musica" id="nomeMusica">Carregando...</div>
        <div class="controles">
            <button id="anterior">⏮</button>
            <button id="playPause">⏸</button>
            <button id="proximo">⏭</button>
        </div>
    </div>

    <script>
        // LISTA DE MÚSICAS
        const URL = 'https://raw.githubusercontent.com/radiolojasjc-hub/play12/refs/heads/main/play.json';
        
        let musicas = [];
        let atual = 0;
        let tocando = false;
        
        const video = document.getElementById('video');
        const player = document.getElementById('player');
        const nomeMusica = document.getElementById('nomeMusica');
        const btnPlay = document.getElementById('playPause');
        const btnAnt = document.getElementById('anterior');
        const btnProx = document.getElementById('proximo');
        const btnFechar = document.getElementById('fechar');
        const container = document.getElementById('botoesContainer');

        // BUSCA AS MÚSICAS
        fetch(URL)
            .then(res => res.json())
            .then(dados => {
                if (Array.isArray(dados) && dados.length > 0) {
                    musicas = dados.filter(m => m.url);
                    if (musicas.length > 0) criarBotoes();
                }
            })
            .catch(() => {
                // SE DER ERRO, USA EXEMPLO
                musicas = [{
                    title: 'Música Exemplo',
                    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                    genre: 'pop'
                }];
                criarBotoes();
            });

        // CRIA OS BOTÕES FLUTUANTES
        function criarBotoes() {
            const generos = [...new Set(musicas.map(m => m.genre || 'pop'))];
            const generosLimitados = generos.slice(0, 12);
            
            container.innerHTML = '';
            
            generosLimitados.forEach((genero, i) => {
                const btn = document.createElement('div');
                btn.className = `btn cor${(i % 12) + 1}`;
                
                btn.addEventListener('click', function() {
                    const musicasGenero = musicas.filter(m => (m.genre || 'pop') === genero);
                    if (musicasGenero.length > 0) {
                        const primeiroIndex = musicas.indexOf(musicasGenero[0]);
                        if (primeiroIndex !== -1) {
                            atual = primeiroIndex;
                            tocar();
                        }
                    }
                });
                
                container.appendChild(btn);
            });
        }

        // TOCA A MÚSICA
        function tocar() {
            if (musicas.length === 0 || atual >= musicas.length) return;
            
            const musica = musicas[atual];
            if (!musica || !musica.url) return;
            
            player.classList.add('ativo');
            nomeMusica.textContent = musica.title || 'Música';
            
            video.src = musica.url;
            video.load();
            video.play().then(() => {
                tocando = true;
                btnPlay.textContent = '⏸';
            }).catch(() => {
                tocando = false;
                btnPlay.textContent = '▶';
            });
        }

        // PRÓXIMA
        function proxima() {
            if (musicas.length === 0) return;
            atual = (atual + 1) % musicas.length;
            tocar();
        }

        // ANTERIOR
        function anterior() {
            if (musicas.length === 0) return;
            atual = (atual - 1 + musicas.length) % musicas.length;
            tocar();
        }

        // PLAY/PAUSE
        function playPause() {
            if (tocando) {
                video.pause();
                tocando = false;
                btnPlay.textContent = '▶';
            } else {
                video.play().then(() => {
                    tocando = true;
                    btnPlay.textContent = '⏸';
                }).catch(() => {});
            }
        }

        // EVENTOS
        btnPlay.addEventListener('click', playPause);
        btnProx.addEventListener('click', proxima);
        btnAnt.addEventListener('click', anterior);
        
        btnFechar.addEventListener('click', function() {
            player.classList.remove('ativo');
            video.pause();
            tocando = false;
            btnPlay.textContent = '▶';
        });

        video.addEventListener('ended', proxima);
        video.addEventListener('play', () => {
            tocando = true;
            btnPlay.textContent = '⏸';
        });
        video.addEventListener('pause', () => {
            tocando = false;
            btnPlay.textContent = '▶';
        });
    </script>
</body>
</html>
