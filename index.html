<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY 12</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }

        /* BOTÕES FLUTUANTES - APENAS CORES */
        .float-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 30px 0;
        }
        .float-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            position: relative;
        }
        .float-btn:active {
            transform: scale(0.85);
        }
        
        /* CORES DOS BOTÕES */
        .btn-1 { background: #ff0066; border-color: #ff0066; }
        .btn-2 { background: #ff3366; border-color: #ff3366; }
        .btn-3 { background: #ff8800; border-color: #ff8800; }
        .btn-4 { background: #00ff88; border-color: #00ff88; }
        .btn-5 { background: #ffdd00; border-color: #ffdd00; }
        .btn-6 { background: #ff66aa; border-color: #ff66aa; }
        .btn-7 { background: #aa55ff; border-color: #aa55ff; }
        .btn-8 { background: #00ccff; border-color: #00ccff; }
        .btn-9 { background: #ff4400; border-color: #ff4400; }
        .btn-10 { background: #00ffaa; border-color: #00ffaa; }
        .btn-11 { background: #ff00aa; border-color: #ff00aa; }
        .btn-12 { background: #ff3377; border-color: #ff3377; }

        /* EFEITO DE BRILHO */
        .float-btn::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            background: inherit;
            opacity: 0.3;
            filter: blur(15px);
            z-index: -1;
        }

        /* PLAYER COM VÍDEO play12.mp4 */
        #player-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 10px 15px;
            z-index: 1000;
            display: none;
            border-top: 2px solid rgba(255,255,255,0.1);
        }
        #player-container.active {
            display: block;
        }
        #player-container video {
            width: 100%;
            max-height: 250px;
            background: #000;
            border-radius: 10px;
        }
        #player-container .controles {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 10px 0 5px 0;
        }
        #player-container .controles button {
            background: transparent;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 5px 10px;
        }
        #player-container .controles button:active {
            transform: scale(0.8);
        }
        #player-container .info-musica {
            color: white;
            text-align: center;
            padding: 5px;
            font-size: 15px;
            font-family: Arial, sans-serif;
        }
        #fechar-player {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 26px;
            cursor: pointer;
            background: none;
            border: none;
        }

        @media (max-width: 600px) {
            .float-btn {
                width: 55px;
                height: 55px;
            }
            .float-buttons {
                gap: 15px;
            }
        }
        @media (max-width: 400px) {
            .float-btn {
                width: 45px;
                height: 45px;
            }
            .float-buttons {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="float-buttons" id="botoes">
            <!-- BOTÕES GERADOS PELO JS -->
        </div>
    </div>

    <!-- PLAYER COM VÍDEO play12.mp4 -->
    <div id="player-container">
        <button id="fechar-player">✕</button>
        <video id="videoPlayer" controls autoplay playsinline>
            <source src="play12.mp4" type="video/mp4">
        </video>
        <div class="info-musica" id="infoMusica">Carregando...</div>
        <div class="controles">
            <button id="btn-anterior">⏮</button>
            <button id="btn-playpause">⏸</button>
            <button id="btn-proximo">⏭</button>
        </div>
    </div>

    <script>
        // LISTA DE MÚSICAS DO JSON
        const URL_JSON = 'https://raw.githubusercontent.com/radiolojasjc-hub/play12/refs/heads/main/play.json';
        
        let listaMusicas = [];
        let indiceAtual = 0;
        let estaTocando = false;
        
        const video = document.getElementById('videoPlayer');
        const player = document.getElementById('player-container');
        const infoMusica = document.getElementById('infoMusica');
        const btnPlayPause = document.getElementById('btn-playpause');
        const btnAnterior = document.getElementById('btn-anterior');
        const btnProximo = document.getElementById('btn-proximo');
        const btnFechar = document.getElementById('fechar-player');
        const containerBotoes = document.getElementById('botoes');

        // CARREGA A LISTA DO JSON
        fetch(URL_JSON)
            .then(res => res.json())
            .then(dados => {
                if (Array.isArray(dados) && dados.length > 0) {
                    listaMusicas = dados.filter(m => m.url && m.url.trim() !== '');
                    if (listaMusicas.length > 0) {
                        criarBotoes();
                    }
                }
            })
            .catch(() => {
                // SE DER ERRO, USA MÚSICA DE EXEMPLO
                listaMusicas = [{
                    title: 'Música Exemplo',
                    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                    genre: 'pop'
                }];
                criarBotoes();
            });

        // CRIA OS BOTÕES FLUTUANTES (SÓ CORES, SEM TEXTOS)
        function criarBotoes() {
            // PEGA OS GÊNEROS ÚNICOS
            const generos = [...new Set(listaMusicas.map(m => m.genre || 'pop'))];
            
            // LIMITA A 12 BOTÕES
            const generosLimitados = generos.slice(0, 12);
            
            containerBotoes.innerHTML = '';
            
            generosLimitados.forEach((genero, i) => {
                const btn = document.createElement('div');
                btn.className = `float-btn btn-${(i % 12) + 1}`;
                btn.dataset.genero = genero;
                
                btn.addEventListener('click', function() {
                    // ENCONTRA A PRIMEIRA MÚSICA DO GÊNERO
                    const musicasGenero = listaMusicas.filter(m => (m.genre || 'pop') === genero);
                    if (musicasGenero.length > 0) {
                        const primeiroIndex = listaMusicas.indexOf(musicasGenero[0]);
                        if (primeiroIndex !== -1) {
                            indiceAtual = primeiroIndex;
                            tocarMusica();
                        }
                    }
                });
                
                containerBotoes.appendChild(btn);
            });
        }

        // TOCA A MÚSICA ATUAL
        function tocarMusica() {
            if (listaMusicas.length === 0 || indiceAtual >= listaMusicas.length) return;
            
            const musica = listaMusicas[indiceAtual];
            if (!musica || !musica.url) return;
            
            // MOSTRA O PLAYER
            player.classList.add('active');
            
            // ATUALIZA INFORMAÇÃO
            infoMusica.textContent = musica.title || 'Música';
            
            // TOCA O VÍDEO (play12.mp4) COM A MÚSICA
            video.src = musica.url;
            video.load();
            video.play().then(() => {
                estaTocando = true;
                btnPlayPause.textContent = '⏸';
            }).catch(() => {
                estaTocando = false;
                btnPlayPause.textContent = '▶';
            });
        }

        // PRÓXIMA MÚSICA
        function proximaMusica() {
            if (listaMusicas.length === 0) return;
            indiceAtual = (indiceAtual + 1) % listaMusicas.length;
            tocarMusica();
        }

        // MÚSICA ANTERIOR
        function anteriorMusica() {
            if (listaMusicas.length === 0) return;
            indiceAtual = (indiceAtual - 1 + listaMusicas.length) % listaMusicas.length;
            tocarMusica();
        }

        // PLAY/PAUSE
        function playPause() {
            if (estaTocando) {
                video.pause();
                estaTocando = false;
                btnPlayPause.textContent = '▶';
            } else {
                video.play().then(() => {
                    estaTocando = true;
                    btnPlayPause.textContent = '⏸';
                }).catch(() => {});
            }
        }

        // EVENTOS DOS CONTROLES
        btnPlayPause.addEventListener('click', playPause);
        btnProximo.addEventListener('click', proximaMusica);
        btnAnterior.addEventListener('click', anteriorMusica);
        
        btnFechar.addEventListener('click', function() {
            player.classList.remove('active');
            video.pause();
            estaTocando = false;
            btnPlayPause.textContent = '▶';
        });

        // QUANDO O VÍDEO TERMINA, VAI PARA O PRÓXIMO
        video.addEventListener('ended', proximaMusica);

        // QUANDO O USUÁRIO CLICA NO PLAYER NATIVO
        video.addEventListener('play', () => {
            estaTocando = true;
            btnPlayPause.textContent = '⏸';
        });
        video.addEventListener('pause', () => {
            estaTocando = false;
            btnPlayPause.textContent = '▶';
        });
    </script>
</body>
</html>
