<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY 12 • MODA TOP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .player { text-align: center; max-width: 400px; width: 100%; }
        h1 { font-size: 2rem; color: #ff4400; }
        .sub { color: #888; font-size: 0.8rem; margin-bottom: 20px; }
        .title { font-size: 1.5rem; font-weight: bold; margin: 15px 0 5px; }
        .artist { color: #aaa; margin-bottom: 20px; }
        .btn { background: #ff4400; border: none; padding: 12px 30px; border-radius: 30px; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; margin: 5px; }
        .btn:active { transform: scale(0.95); }
        .btn-sec { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-voltar { background: #333; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin-top: 15px; }
        .status { color: #666; font-size: 0.7rem; margin-top: 10px; }
        .loading { color: #ff4400; margin: 20px 0; }
        .erro { color: #ff4444; margin: 10px 0; display: none; }
    </style>
</head>
<body>
    <div class="player">
        <h1>🔥 MODA TOP</h1>
        <div class="sub">PLAY 12 • O que está em alta</div>
        
        <div id="loading" class="loading">⏳ Carregando músicas...</div>
        <div id="erro" class="erro">❌ Erro ao carregar. Usando músicas de teste.</div>
        
        <div id="player" style="display:none;">
            <div class="title" id="title">Carregando...</div>
            <div class="artist" id="artist">Aguarde</div>
            
            <div>
                <button class="btn" id="playBtn">▶ PLAY</button>
                <button class="btn btn-sec" id="nextBtn">⏭ PRÓXIMA</button>
            </div>
            
            <button class="btn-voltar" onclick="window.location.href='https://radiolojasjc-hub.github.io/play12/'">← VOLTAR</button>
            <div class="status" id="status">Pronto</div>
        </div>
    </div>

    <script>
        // PLAYER SIMPLES - NÃO TRAVA
        const audio = new Audio();
        let musicas = [];
        let index = 0;

        // PLAYLIST DE TESTE (funciona 100%)
        const PLAYLIST_TESTE = [
            {title: "Moda 1", artist: "Artista Teste", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
            {title: "Moda 2", artist: "Artista Teste", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
            {title: "Moda 3", artist: "Artista Teste", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"}
        ];

        const loading = document.getElementById('loading');
        const erro = document.getElementById('erro');
        const player = document.getElementById('player');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const playBtn = document.getElementById('playBtn');
        const nextBtn = document.getElementById('nextBtn');
        const status = document.getElementById('status');

        async function iniciar() {
            try {
                const response = await fetch('moda.json');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        musicas = data.filter(m => m.src && m.src.trim().length > 0);
                        if (musicas.length === 0) throw new Error('Playlist vazia');
                    } else {
                        musicas = PLAYLIST_TESTE;
                        erro.style.display = 'block';
                    }
                } else {
                    musicas = PLAYLIST_TESTE;
                    erro.style.display = 'block';
                }
            } catch (e) {
                musicas = PLAYLIST_TESTE;
                erro.style.display = 'block';
            }

            loading.style.display = 'none';
            player.style.display = 'block';
            tocar(0);
        }

        function tocar(idx) {
            if (idx >= musicas.length) idx = 0;
            if (idx < 0) idx = musicas.length - 1;
            index = idx;
            
            const m = musicas[index];
            title.textContent = m.title || 'Sem título';
            artist.textContent = m.artist || 'Artista desconhecido';
            status.textContent = `${index+1}/${musicas.length}`;
            
            audio.src = m.src;
            audio.load();
            
            let timeout = setTimeout(() => {
                if (audio.paused) {
                    console.warn('Timeout, pulando...');
                    setTimeout(() => tocar(index + 1), 500);
                }
            }, 5000);

            audio.play().then(() => {
                clearTimeout(timeout);
                playBtn.textContent = '⏸ PAUSE';
            }).catch(() => {
                clearTimeout(timeout);
                setTimeout(() => tocar(index + 1), 1000);
            });
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playBtn.textContent = '⏸ PAUSE'; }
            else { audio.pause(); playBtn.textContent = '▶ PLAY'; }
        }

        function proxima() { tocar(index + 1); }

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', proxima);
        audio.addEventListener('ended', () => tocar(index + 1));
        audio.addEventListener('play', () => { playBtn.textContent = '⏸ PAUSE'; });
        audio.addEventListener('pause', () => { if (!audio.ended) playBtn.textContent = '▶ PLAY'; });
        audio.addEventListener('error', () => {
            console.warn('Erro no áudio, pulando...');
            setTimeout(() => tocar(index + 1), 1000);
        });

        window.addEventListener('load', iniciar);
    </script>
</body>
</html>
