<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY 12 • Música Direto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00f3ff, #ff2d7f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        .logo p {
            color: #888;
            font-size: 1rem;
            margin-top: 5px;
        }
        /* Grid de botões flutuantes (sem textos) */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 22px 0;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 2px solid rgba(255,255,255,0.08);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .card:active {
            transform: scale(0.92);
        }
        .card .emoji {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 4px;
        }
        .card .nome {
            display: none; /* esconde nomes, só ícones */
        }
        .card .desc {
            display: none; /* esconde descrições */
        }
        /* Cores de borda para cada gênero (mantido para referência) */
        .card.forro { border-color: #ff00aa; }
        .card.pop { border-color: #ff3366; }
        .card.sertanejo { border-color: #ff8800; }
        .card.mpb { border-color: #00ff88; }
        .card.samba { border-color: #ffdd00; }
        .card.brega { border-color: #ff66aa; }
        .card.religiosa { border-color: #aa55ff; }
        .card.global { border-color: #00ccff; }
        .card.moda { border-color: #ff4400; }
        .card.reggae { border-color: #00ffaa; }
        .card.funk { border-color: #ff0066; }
        .card.rock { border-color: #ff3377; }

        /* vídeo player oculto */
        #player-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 999;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }
        #player-container.hidden {
            transform: translateY(80px);
            opacity: 0;
            pointer-events: none;
        }
        #player-container .info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        #player-container .info .thumb {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #222;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }
        #player-container .info .track-name {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #player-container .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #player-container .controls button {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.2s;
        }
        #player-container .controls button:active {
            transform: scale(0.85);
        }
        #player-container .controls .play-btn {
            background: rgba(255,255,255,0.15);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #player-container .controls .play-btn i {
            font-size: 1.2rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #444;
            font-size: 0.7rem;
        }
        /* responsivo */
        @media (max-width: 600px) {
            .logo h1 { font-size: 2rem; }
            .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .card { padding: 16px 0; }
            .card .emoji { font-size: 2.2rem; }
        }
        @media (max-width: 400px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .card { padding: 12px 0; border-radius: 20px; }
            .card .emoji { font-size: 1.8rem; }
            #player-container { padding: 10px 14px; }
            #player-container .info .track-name { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎵 PLAY 12</h1>
            <p>Toque e curta • sem textos, só som</p>
        </div>
        <div class="grid" id="genreGrid">
            <!-- Os botões serão gerados via JavaScript -->
        </div>
        <div class="footer"><p>PLAY 12 • direto da lista</p></div>
    </div>

    <!-- Player flutuante (inicialmente oculto) -->
    <div id="player-container" class="hidden">
        <div class="info">
            <div class="thumb" id="thumb" style="background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9IiMyMjIiLz48L3N2Zz4=');"></div>
            <span class="track-name" id="trackName">Nenhuma música</span>
        </div>
        <div class="controls">
            <button id="prevBtn"><i class="fas fa-step-backward"></i></button>
            <button class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
            <button id="nextBtn"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>

    <!-- Áudio (HTML5) -->
    <audio id="audioPlayer" style="display:none;"></audio>

    <script>
        (function() {
            // ------- CONFIG -------
            const PLAYLIST_URL = 'https://raw.githubusercontent.com/radiolojasjc-hub/play12/refs/heads/main/play.json';
            // Mapeamento de gênero -> ícone (sem nomes)
            const GENRE_ICONS = {
                'forro': '🪗',
                'pop': '🎤',
                'sertanejo': '🤠',
                'mpb': '🎸',
                'samba': '🥁',
                'brega': '💔',
                'religiosa': '🙏',
                'global': '🌍',
                'moda': '🔥',
                'reggae': '🌿',
                'funk': '🕺',
                'rock': '🎸'
            };
            // Cores para cada gênero (borda)
            const GENRE_COLORS = {
                'forro': '#ff00aa',
                'pop': '#ff3366',
                'sertanejo': '#ff8800',
                'mpb': '#00ff88',
                'samba': '#ffdd00',
                'brega': '#ff66aa',
                'religiosa': '#aa55ff',
                'global': '#00ccff',
                'moda': '#ff4400',
                'reggae': '#00ffaa',
                'funk': '#ff0066',
                'rock': '#ff3377'
            };

            // Estado
            let allSongs = [];               // array de músicas { genre, title, url, cover? }
            let currentGenre = 'forro';       // gênero ativo
            let currentIndex = 0;
            let isPlaying = false;
            let audio = document.getElementById('audioPlayer');
            const playerContainer = document.getElementById('player-container');
            const trackNameEl = document.getElementById('trackName');
            const thumbEl = document.getElementById('thumb');
            const playBtn = document.getElementById('playBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const grid = document.getElementById('genreGrid');

            // ------- FUNÇÕES -------
            function loadPlaylist() {
                fetch(PLAYLIST_URL)
                    .then(res => {
                        if (!res.ok) throw new Error('Erro ao buscar playlist');
                        return res.json();
                    })
                    .then(data => {
                        if (Array.isArray(data) && data.length > 0) {
                            allSongs = data.map(item => ({
                                genre: item.genre || 'pop',
                                title: item.title || 'Música sem título',
                                url: item.url || '',
                                cover: item.cover || ''
                            }));
                            // Filtra apenas músicas com URL
                            allSongs = allSongs.filter(s => s.url && s.url.trim() !== '');
                            if (allSongs.length === 0) {
                                // fallback
                                allSongs = [{
                                    genre: 'pop',
                                    title: 'Exemplo',
                                    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                                    cover: ''
                                }];
                            }
                            // Define gênero padrão = primeiro da lista
                            if (allSongs.length) {
                                currentGenre = allSongs[0].genre || 'pop';
                                currentIndex = 0;
                                updatePlayerInfo();
                            }
                            renderGenreButtons();
                        } else {
                            throw new Error('Lista vazia');
                        }
                    })
                    .catch(err => {
                        console.warn('Erro ao carregar playlist, usando fallback:', err);
                        // Fallback com 1 música de exemplo
                        allSongs = [{
                            genre: 'pop',
                            title: 'Música de exemplo',
                            url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                            cover: ''
                        }];
                        currentGenre = 'pop';
                        currentIndex = 0;
                        updatePlayerInfo();
                        renderGenreButtons();
                    });
            }

            // Gera botões de gênero (ícones flutuantes)
            function renderGenreButtons() {
                // Pega lista de gêneros únicos a partir das músicas carregadas
                const genres = [...new Set(allSongs.map(s => s.genre))];
                if (genres.length === 0) {
                    // fallback com todos os gêneros
                    const allGenres = Object.keys(GENRE_ICONS);
                    genres.push(...allGenres);
                }
                grid.innerHTML = '';
                genres.forEach(genre => {
                    const card = document.createElement('div');
                    card.className = `card ${genre}`;
                    // cor da borda
                    const color = GENRE_COLORS[genre] || '#ffffff';
                    card.style.borderColor = color;
                    // ícone
                    const icon = GENRE_ICONS[genre] || '🎵';
                    card.innerHTML = `<span class="emoji">${icon}</span>`;
                    // evento de clique: toca o primeiro do gênero
                    card.addEventListener('click', function(e) {
                        e.preventDefault();
                        playGenre(genre);
                    });
                    grid.appendChild(card);
                });
            }

            // Toca uma música de um gênero específico (primeira da lista)
            function playGenre(genre) {
                const songs = allSongs.filter(s => s.genre === genre);
                if (songs.length === 0) {
                    // se não tiver música desse gênero, tenta tocar qualquer uma
                    if (allSongs.length) {
                        currentGenre = allSongs[0].genre;
                        currentIndex = 0;
                        playCurrent();
                    }
                    return;
                }
                // Encontra o índice da primeira música desse gênero no array allSongs
                const firstIndex = allSongs.findIndex(s => s.genre === genre);
                if (firstIndex === -1) {
                    // fallback
                    if (allSongs.length) {
                        currentGenre = allSongs[0].genre;
                        currentIndex = 0;
                        playCurrent();
                    }
                    return;
                }
                currentGenre = genre;
                currentIndex = firstIndex;
                playCurrent();
            }

            function playCurrent() {
                if (!allSongs.length || currentIndex >= allSongs.length) {
                    return;
                }
                const song = allSongs[currentIndex];
                if (!song || !song.url) {
                    // tenta próximo
                    nextTrack();
                    return;
                }
                // Atualiza info
                trackNameEl.textContent = song.title || 'Sem título';
                if (song.cover && song.cover.startsWith('http')) {
                    thumbEl.style.backgroundImage = `url('${song.cover}')`;
                } else {
                    thumbEl.style.backgroundImage = `url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9IiMyMjIiLz48L3N2Zz4=')`;
                }
                // Mostra player
                playerContainer.classList.remove('hidden');

                // Carrega e toca
                audio.src = song.url;
                audio.load();
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                }).catch(e => {
                    console.warn('Erro ao reproduzir:', e);
                    isPlaying = false;
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                });
                // Atualiza genero atual
                currentGenre = song.genre || currentGenre;
            }

            function updatePlayerInfo() {
                if (allSongs.length && currentIndex < allSongs.length) {
                    const song = allSongs[currentIndex];
                    trackNameEl.textContent = song.title || 'Sem título';
                    if (song.cover && song.cover.startsWith('http')) {
                        thumbEl.style.backgroundImage = `url('${song.cover}')`;
                    } else {
                        thumbEl.style.backgroundImage = `url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9IiMyMjIiLz48L3N2Zz4=')`;
                    }
                }
            }

            function nextTrack() {
                if (!allSongs.length) return;
                // Procura próximo do mesmo gênero, se não tiver, volta ao primeiro do gênero
                let nextIndex = currentIndex + 1;
                if (nextIndex >= allSongs.length) {
                    // volta ao início do gênero atual
                    const firstOfGenre = allSongs.findIndex(s => s.genre === currentGenre);
                    if (firstOfGenre !== -1) {
                        currentIndex = firstOfGenre;
                    } else {
                        currentIndex = 0;
                    }
                } else {
                    // verifica se o próximo é do mesmo gênero, senão pula para o primeiro do gênero
                    if (allSongs[nextIndex].genre !== currentGenre) {
                        const firstOfGenre = allSongs.findIndex(s => s.genre === currentGenre);
                        if (firstOfGenre !== -1) {
                            currentIndex = firstOfGenre;
                        } else {
                            currentIndex = 0;
                        }
                    } else {
                        currentIndex = nextIndex;
                    }
                }
                playCurrent();
            }

            function prevTrack() {
                if (!allSongs.length) return;
                let prevIndex = currentIndex - 1;
                if (prevIndex < 0) {
                    // último do gênero atual
                    const lastOfGenre = allSongs.lastIndexOf(allSongs.find(s => s.genre === currentGenre));
                    if (lastOfGenre !== -1) {
                        currentIndex = lastOfGenre;
                    } else {
                        currentIndex = 0;
                    }
                } else {
                    if (allSongs[prevIndex].genre !== currentGenre) {
                        const lastOfGenre = allSongs.lastIndexOf(allSongs.find(s => s.genre === currentGenre));
                        if (lastOfGenre !== -1) {
                            currentIndex = lastOfGenre;
                        } else {
                            currentIndex = 0;
                        }
                    } else {
                        currentIndex = prevIndex;
                    }
                }
                playCurrent();
            }

            // Eventos do player
            playBtn.addEventListener('click', function() {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                } else {
                    audio.play().catch(e => {});
                    isPlaying = true;
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                }
            });

            nextBtn.addEventListener('click', function() {
                nextTrack();
            });

            prevBtn.addEventListener('click', function() {
                prevTrack();
            });

            audio.addEventListener('ended', function() {
                nextTrack();
            });

            audio.addEventListener('play', function() {
                isPlaying = true;
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            });

            audio.addEventListener('pause', function() {
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            });

            audio.addEventListener('error', function(e) {
                console.warn('Erro no áudio, pulando para próximo');
                nextTrack();
            });

            // Inicializa
            loadPlaylist();
        })();
    </script>
</body>
</html>
